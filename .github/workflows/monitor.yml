name: E-Consular Appointment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          EC_EMAIL: ${{ secrets.EC_EMAIL }}
          EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
          CALLMEBOT_USER: ${{ secrets.CALLMEBOT_USER }}
        run: node monitor.js --once --log-file docs/status.json

      - name: Push status via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request, sys

          token = os.environ['GH_TOKEN']
          repo  = os.environ['REPO']
          url   = f"https://api.github.com/repos/{repo}/contents/docs/status.json"

          with open('docs/status.json', 'rb') as f:
              content_b64 = base64.b64encode(f.read()).decode()

          # Get current SHA
          req = urllib.request.Request(url, headers={'Authorization': f'token {token}', 'User-Agent': 'ec-monitor'})
          sha = None
          try:
              with urllib.request.urlopen(req) as r:
                  sha = json.load(r).get('sha')
          except Exception as e:
              print(f"Could not fetch SHA: {e}")

          payload = {'message': 'chore: update status [skip ci]', 'content': content_b64}
          if sha:
              payload['sha'] = sha

          data = json.dumps(payload).encode()
          put = urllib.request.Request(url, data=data, method='PUT',
              headers={'Authorization': f'token {token}', 'User-Agent': 'ec-monitor', 'Content-Type': 'application/json'})
          try:
              with urllib.request.urlopen(put) as r:
                  print(f"Status updated via API (HTTP {r.status})")
          except Exception as e:
              print(f"API update FAILED: {e}")
              sys.exit(1)
          PY
