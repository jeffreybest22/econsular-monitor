name: E-Consular Appointment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          EC_EMAIL: ${{ secrets.EC_EMAIL }}
          EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: node monitor.js --once --log-file docs/status.json

      - name: Commit status update
        run: |
          git config user.email "monitor@github-actions"
          git config user.name "E-Consular Monitor"
          git add docs/status.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update monitor status [skip ci]"
          git pull --rebase origin master
          git push
