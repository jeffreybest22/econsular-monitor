name: E-Consular Appointment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          EC_EMAIL: ${{ secrets.EC_EMAIL }}
          EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: node monitor.js --once --log-file docs/status.json

      - name: Push status via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CONTENT=$(base64 -w 0 docs/status.json)
          SHA=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/contents/docs/status.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          DATA="{\"message\":\"chore: update status [skip ci]\",\"content\":\"$CONTENT\""
          [ -n "$SHA" ] && DATA="$DATA,\"sha\":\"$SHA\""
          DATA="$DATA}"
          curl -sf -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/contents/docs/status.json" \
            -d "$DATA" > /dev/null && echo "Status updated via API" || echo "API update failed"
