name: E-Consular Appointment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve domain via Cloudflare DoH and inject hosts
        run: |
          IP=$(curl -sf "https://cloudflare-dns.com/dns-query?name=ec-portoprincipe.itamaraty.gov.br&type=A" \
            -H "accept: application/dns-json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Answer'][0]['data'])" 2>/dev/null || echo "")
          if [ -n "$IP" ]; then
            echo "Resolved IP: $IP"
            echo "$IP ec-portoprincipe.itamaraty.gov.br" | sudo tee -a /etc/hosts
          else
            echo "Cloudflare DoH failed — trying Google DoH"
            IP=$(curl -sf "https://dns.google/resolve?name=ec-portoprincipe.itamaraty.gov.br&type=A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Answer'][0]['data'])" 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "Resolved IP via Google: $IP"
              echo "$IP ec-portoprincipe.itamaraty.gov.br" | sudo tee -a /etc/hosts
            else
              echo "WARNING: DNS resolution failed from both DoH providers"
            fi
          fi
          nslookup ec-portoprincipe.itamaraty.gov.br || true

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          EC_EMAIL: ${{ secrets.EC_EMAIL }}
          EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: node monitor.js --once
