name: E-Consular Appointment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix DNS resolution
        run: |
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          nslookup ec-portoprince.itamaraty.gov.br || echo "DNS still failing"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          EC_EMAIL: ${{ secrets.EC_EMAIL }}
          EC_PASSWORD: ${{ secrets.EC_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: node monitor.js --once
